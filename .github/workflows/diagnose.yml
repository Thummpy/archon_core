# One-off diagnostic workflow — SSH into VM and dump discord-bot logs.
# Safe to delete after debugging.

name: Diagnose Discord Bot

on:
  workflow_dispatch:

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Extract SSH credentials
        id: tf
        working-directory: terraform
        run: |
          terraform init -backend=true -input=false >/dev/null 2>&1
          DEPLOY_HOST=$(terraform output -json instance_ips | jq -r '.chris')
          terraform output -json ssh_private_keys | jq -r '.chris' > /tmp/key.pem
          chmod 600 /tmp/key.pem
          echo "host=${DEPLOY_HOST}" >> "$GITHUB_OUTPUT"

      - name: Run diagnostics on VM
        env:
          DEPLOY_HOST: ${{ steps.tf.outputs.host }}
        run: |
          ssh -o StrictHostKeyChecking=no -o ConnectTimeout=30 \
            -i /tmp/key.pem \
            "chris@${DEPLOY_HOST}" 'bash -c "
            cd ~/archon_core
            exec > /tmp/discord-diag.log 2>&1

            echo \"=== Container Status ===\"
            docker compose ps || true

            echo \"\"
            echo \"=== Discord Bot Logs (last 100 lines) ===\"
            docker compose logs discord-bot --tail=100 || true

            echo \"\"
            echo \"=== Test 1: Claude CLI WITHOUT project-dir ===\"
            timeout 60 docker compose exec -T discord-bot bash -c \"claude -p test --output-format text 2>&1\" 2>&1 || echo \"FAILED exit=\$?\"

            echo \"\"
            echo \"=== Test 2: Claude CLI WITH project-dir ===\"
            timeout 60 docker compose exec -T discord-bot bash -c \"claude -p test --output-format text --project-dir /data/projects/Thummpy/dnd-context/source 2>&1\" 2>&1 || echo \"FAILED exit=\$?\"

            echo \"\"
            echo \"=== Test 3: Check project .claude dir permissions ===\"
            docker compose exec -T discord-bot ls -la /data/projects/Thummpy/dnd-context/source/.claude/ 2>&1 || echo \"NO .claude DIR\"
            docker compose exec -T discord-bot bash -c \"touch /data/projects/Thummpy/dnd-context/source/.claude/test-write 2>&1 && echo WRITE_OK && rm -f /data/projects/Thummpy/dnd-context/source/.claude/test-write || echo WRITE_FAILED\" 2>&1 || true

            echo \"\"
            echo \"=== DONE ===\"
            "'

      - name: Fetch and display diagnostics
        env:
          DEPLOY_HOST: ${{ steps.tf.outputs.host }}
        run: |
          ssh -o StrictHostKeyChecking=no -o ConnectTimeout=30 \
            -i /tmp/key.pem \
            "chris@${DEPLOY_HOST}" 'cat /tmp/discord-diag.log'

      - name: Cleanup
        if: always()
        run: rm -f /tmp/key.pem
