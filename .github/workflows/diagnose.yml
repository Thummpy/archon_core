# One-off diagnostic workflow — SSH into VM and dump discord-bot logs.
# Safe to delete after debugging.

name: Diagnose Discord Bot

on:
  workflow_dispatch:

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Extract SSH credentials
        id: tf
        working-directory: terraform
        run: |
          terraform init -backend=true -input=false >/dev/null 2>&1
          DEPLOY_HOST=$(terraform output -json instance_ips | jq -r '.chris')
          terraform output -json ssh_private_keys | jq -r '.chris' > /tmp/key.pem
          chmod 600 /tmp/key.pem
          echo "host=${DEPLOY_HOST}" >> "$GITHUB_OUTPUT"

      - name: Dump discord-bot diagnostics
        env:
          DEPLOY_HOST: ${{ steps.tf.outputs.host }}
        run: |
          ssh -o StrictHostKeyChecking=no -o ConnectTimeout=30 -o ServerAliveInterval=10 \
            -i /tmp/key.pem \
            "chris@${DEPLOY_HOST}" bash -s <<'DIAG'
          set -uo pipefail

          cd ~/archon_core

          echo "=== Container Status ==="
          docker compose ps 2>&1 || true

          echo ""
          echo "=== Discord Bot Logs (last 100 lines) ==="
          docker compose logs discord-bot --tail=100 2>&1 || true

          echo ""
          echo "=== Discord Bot Env Check ==="
          docker compose exec -T discord-bot env 2>&1 | grep -E "CLAUDE|DISCORD|DATA_DIR|HOME|PATH" | sed 's/=.*/=<set>/' || true

          echo ""
          echo "=== Project Dir Check ==="
          docker compose exec -T discord-bot ls -la /data/projects/Thummpy/dnd-context/source/ 2>&1 || echo "NOT FOUND"

          echo ""
          echo "=== Claude CLI Version ==="
          docker compose exec -T discord-bot claude --version 2>&1 || echo "CLAUDE CLI NOT FOUND OR ERRORED"

          echo ""
          echo "=== File Permissions ==="
          docker compose exec -T discord-bot ls -la /home/botuser/.claude/ 2>&1 || echo "No .claude dir"
          docker compose exec -T discord-bot id 2>&1 || true

          echo ""
          echo "=== Direct Claude CLI Test ==="
          docker compose exec -T discord-bot bash -c 'CLAUDE_CODE_OAUTH_TOKEN=$CLAUDE_CODE_OAUTH_TOKEN claude -p "say hello" --output-format text 2>&1; echo "EXIT_CODE=$?"' 2>&1 || echo "EXEC FAILED"

          echo ""
          echo "=== DNS Check ==="
          docker compose exec -T discord-bot bash -c 'getent hosts api.anthropic.com 2>&1 || echo "DNS FAILED"' || true

          echo ""
          echo "=== DONE ==="
          DIAG

      - name: Cleanup
        if: always()
        run: rm -f /tmp/key.pem
