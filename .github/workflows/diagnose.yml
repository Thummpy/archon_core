# One-off diagnostic workflow — SSH into VM and dump discord-bot logs.
# Safe to delete after debugging.

name: Diagnose Discord Bot

on:
  workflow_dispatch:

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Extract SSH credentials
        id: tf
        working-directory: terraform
        run: |
          terraform init -backend=true -input=false >/dev/null 2>&1
          DEPLOY_HOST=$(terraform output -json instance_ips | jq -r '.chris')
          terraform output -json ssh_private_keys | jq -r '.chris' > /tmp/key.pem
          chmod 600 /tmp/key.pem
          echo "host=${DEPLOY_HOST}" >> "$GITHUB_OUTPUT"

      - name: Run diagnostics on VM
        env:
          DEPLOY_HOST: ${{ steps.tf.outputs.host }}
        run: |
          # Write the diagnostic script to the VM, run it, then fetch the output
          ssh -o StrictHostKeyChecking=no -o ConnectTimeout=30 \
            -i /tmp/key.pem \
            "chris@${DEPLOY_HOST}" 'bash -c "
            cd ~/archon_core
            exec > /tmp/discord-diag.log 2>&1

            echo \"=== Container Status ===\"
            docker compose ps || true

            echo \"\"
            echo \"=== Discord Bot Logs (last 100 lines) ===\"
            docker compose logs discord-bot --tail=100 || true

            echo \"\"
            echo \"=== Env Check ===\"
            docker compose exec -T discord-bot env 2>&1 | grep -E \"CLAUDE|DISCORD|DATA_DIR|HOME|PATH\" | sed \"s/=.*/=<set>/\" || true

            echo \"\"
            echo \"=== Project Dir Check ===\"
            docker compose exec -T discord-bot ls -la /data/projects/Thummpy/dnd-context/source/ 2>&1 || echo \"NOT FOUND\"

            echo \"\"
            echo \"=== Claude CLI Version ===\"
            docker compose exec -T discord-bot claude --version 2>&1 || echo \"CLAUDE CLI FAILED\"

            echo \"\"
            echo \"=== File Permissions ===\"
            docker compose exec -T discord-bot ls -la /home/botuser/.claude/ 2>&1 || echo \"No .claude dir\"
            docker compose exec -T discord-bot id 2>&1 || true

            echo \"\"
            echo \"=== DNS Check ===\"
            docker compose exec -T discord-bot bash -c \"getent hosts api.anthropic.com 2>&1 || echo DNS_FAILED\" || true

            echo \"\"
            echo \"=== Direct Claude CLI Test (stderr only) ===\"
            docker compose exec -T discord-bot bash -c \"claude -p test --output-format text >/dev/null 2>&1; echo EXIT_CODE=\\\$?\" 2>&1 || echo \"EXEC FAILED\"

            echo \"\"
            echo \"=== Direct Claude CLI Test (full output) ===\"
            timeout 30 docker compose exec -T discord-bot bash -c \"claude -p test --output-format text 2>&1\" 2>&1 || echo \"TIMED_OUT_OR_FAILED exit=\$?\"

            echo \"\"
            echo \"=== DONE ===\"
            "'

      - name: Fetch and display diagnostics
        env:
          DEPLOY_HOST: ${{ steps.tf.outputs.host }}
        run: |
          ssh -o StrictHostKeyChecking=no -o ConnectTimeout=30 \
            -i /tmp/key.pem \
            "chris@${DEPLOY_HOST}" 'cat /tmp/discord-diag.log'

      - name: Cleanup
        if: always()
        run: rm -f /tmp/key.pem
