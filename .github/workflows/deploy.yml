# Deploy to GCP VM via SSH on push to main or manual trigger.
# Pulls SSH credentials from Terraform state (GCS backend) — no manual secrets needed.
# Data volumes (~/archon-data) are NOT touched — only containers are replaced.

name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Extract SSH credentials from Terraform state
        id: tf
        working-directory: terraform
        run: |
          terraform init -backend=true -input=false >/dev/null 2>&1
          DEPLOY_HOST=$(terraform output -json instance_ips | jq -r '.chris')
          terraform output -json ssh_private_keys | jq -r '.chris' > /tmp/deploy_key.pem
          chmod 600 /tmp/deploy_key.pem
          echo "host=${DEPLOY_HOST}" >> "$GITHUB_OUTPUT"

      - name: Deploy to GCP VM via SSH
        env:
          DEPLOY_HOST: ${{ steps.tf.outputs.host }}
        run: |
          ssh -o StrictHostKeyChecking=no -o ConnectTimeout=30 \
            -i /tmp/deploy_key.pem \
            "chris@${DEPLOY_HOST}" bash -s <<'DEPLOY'
          set -euo pipefail

          echo "→ Checking required tools"
          for cmd in git docker; do
            if ! command -v "$cmd" &>/dev/null; then
              echo "✗ Required tool not found: $cmd"
              exit 1
            fi
          done
          echo "✓ All required tools available"

          echo "→ Navigating to project directory"
          cd ~/archon_core

          echo "→ Pulling latest code from main"
          git pull

          echo "→ Verifying git state after pull"
          git log -1 --oneline
          git status --short

          echo "→ Pulling latest Docker images"
          docker compose pull

          echo "→ Restarting containers with new images"
          docker compose up -d

          echo "→ Waiting for containers to stabilize (5s)"
          sleep 5

          echo "→ Verifying container health"
          docker compose ps

          echo "→ Verifying API health"
          if ! curl -sf --max-time 10 http://localhost:3000/api/health > /dev/null; then
            echo "✗ API health check failed"
            echo "→ Container logs:"
            docker compose logs --tail=50
            exit 1
          fi

          echo "✓ Deployment complete - API is healthy"
          DEPLOY

      - name: Cleanup
        if: always()
        run: rm -f /tmp/deploy_key.pem

      - name: Deployment Summary
        if: always()
        run: |
          {
            echo "## Deploy to Production VM"
            echo "- **Status:** ${{ job.status == 'success' && '✅ Success' || '❌ Failed' }}"
            echo "- **Host:** \`${{ steps.tf.outputs.host }}\`"
            echo "- **Commit:** \`${{ github.sha }}\`"
            echo "- **Branch:** \`${{ github.ref_name }}\`"
            echo "- **Triggered by:** ${{ github.event_name }}"
            echo "- **Timestamp:** $(date -u +'%Y-%m-%d %H:%M:%S UTC')"
          } >> "$GITHUB_STEP_SUMMARY"
