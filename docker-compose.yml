services:
  app:
    image: ghcr.io/coleam00/archon:0.3.12
    container_name: archon-app
    env_file: .env
    environment:
      ARCHON_DOCKER: "true"
      PORT: "${PORT:-3000}"
      GITHUB_TOKEN: "${GITHUB_TOKEN:-}"
      GIT_ASKPASS: "/usr/local/bin/git-askpass.sh"
    volumes:
      # Persistent data: SQLite DB, workspace clones, logs. Use ${HOME} — ~ does not expand in compose.
      - ${HOME}/archon-data:/.archon
      # Repo-managed workflows and commands mounted rw so Archon's UI can write new definitions back
      # to the repo. In 0.3.12, getArchonHome() returns /.archon and workflow/command discovery
      # scans direct children — /.archon/workflows and /.archon/commands (upstream PR #1315).
      # The bind mounts overlay the data volume at these paths; Docker resolves mount precedence.
      - ./.archon/workflows:/.archon/workflows
      - ./.archon/commands:/.archon/commands
      # Config is rw — Archon's setup wizard writes credentials here at runtime, and the
      # entrypoint's recursive chown over /.archon fails fatally on any :ro target inside
      # that tree. Runtime writes surface as `git diff .archon/config.yaml`; review before committing.
      - ./.archon/config.yaml:/.archon/config.yaml
      - ./scripts/git-askpass.sh:/usr/local/bin/git-askpass.sh:ro
      - ${HOME}/archon-data/claude-home:/home/appuser/.claude
    networks:
      - archon-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:${PORT:-3000}/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    dns:
      - 8.8.8.8
      - 8.8.4.4
    sysctls:
      - net.ipv6.conf.all.disable_ipv6=1

  oauth2-proxy:
    image: quay.io/oauth2-proxy/oauth2-proxy:v7.7.1-alpine
    container_name: archon-oauth2-proxy
    env_file: .env
    environment:
      OAUTH2_PROXY_PROVIDER: google
      OAUTH2_PROXY_CLIENT_ID: "${OAUTH2_PROXY_CLIENT_ID}"
      OAUTH2_PROXY_CLIENT_SECRET: "${OAUTH2_PROXY_CLIENT_SECRET}"
      OAUTH2_PROXY_COOKIE_SECRET: "${OAUTH2_PROXY_COOKIE_SECRET}"
      OAUTH2_PROXY_EMAIL_DOMAINS: "*"
      OAUTH2_PROXY_REDIRECT_URL: "https://localhost/oauth2/callback"
      OAUTH2_PROXY_UPSTREAMS: "http://app:3000"
      OAUTH2_PROXY_HTTP_ADDRESS: "0.0.0.0:4180"
      OAUTH2_PROXY_COOKIE_SECURE: "true"
      OAUTH2_PROXY_PASS_HOST_HEADER: "true"
      OAUTH_EMAIL: "${OAUTH_EMAIL:-chris@caldwell.ws}"
    volumes:
      - ./scripts/oauth2-proxy-entrypoint.sh:/entrypoint.sh:ro
    entrypoint: ["/bin/sh", "/entrypoint.sh"]
    networks:
      - archon-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:4180/ping || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    depends_on:
      - app

  caddy:
    image: caddy:2.9-alpine
    container_name: archon-caddy
    ports:
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - archon-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider https://localhost:443/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    depends_on:
      - oauth2-proxy

networks:
  archon-network:
    driver: bridge

volumes:
  caddy_data:
  caddy_config:
