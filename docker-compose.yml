services:
  app:
    init: true
    image: ghcr.io/coleam00/archon:0.3.12
    container_name: archon-app
    env_file: .env
    environment:
      ARCHON_DOCKER: "true"
      PORT: "${PORT:-3000}"
      GITHUB_TOKEN: "${GITHUB_TOKEN:-}"
      GIT_ASKPASS: "/usr/local/bin/git-askpass.sh"
    volumes:
      # Persistent data: workflows, commands, config, SQLite DB, workspace clones, logs.
      # Everything under /.archon comes from the persistent volume — NOT the git repo.
      # Use ${HOME} — ~ does not expand in compose.
      - ${HOME}/archon-data:/.archon
      - ./scripts/git-askpass.sh:/usr/local/bin/git-askpass.sh:ro
      - ${HOME}/archon-data/claude-home:/home/appuser/.claude
    networks:
      - archon-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:${PORT:-3000}/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    dns:
      - 8.8.8.8
      - 8.8.4.4
    sysctls:
      - net.ipv6.conf.all.disable_ipv6=1

  oauth2-proxy:
    image: quay.io/oauth2-proxy/oauth2-proxy:v7.7.1-alpine
    container_name: archon-oauth2-proxy
    env_file: .env
    environment:
      OAUTH2_PROXY_PROVIDER: google
      OAUTH2_PROXY_CLIENT_ID: "${OAUTH2_PROXY_CLIENT_ID}"
      OAUTH2_PROXY_CLIENT_SECRET: "${OAUTH2_PROXY_CLIENT_SECRET}"
      OAUTH2_PROXY_COOKIE_SECRET: "${OAUTH2_PROXY_COOKIE_SECRET}"
      OAUTH2_PROXY_EMAIL_DOMAINS: "*"
      OAUTH2_PROXY_REDIRECT_URL: "https://${ARCHON_DOMAIN:-localhost}/oauth2/callback"
      OAUTH2_PROXY_UPSTREAMS: "http://app:3000"
      OAUTH2_PROXY_HTTP_ADDRESS: "0.0.0.0:4180"
      OAUTH2_PROXY_COOKIE_SECURE: "true"
      OAUTH2_PROXY_PASS_HOST_HEADER: "true"
      OAUTH_EMAIL: "${OAUTH_EMAIL}"
    volumes:
      - ./scripts/oauth2-proxy-entrypoint.sh:/entrypoint.sh:ro
    entrypoint: ["/bin/sh", "/entrypoint.sh"]
    networks:
      - archon-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:4180/ping || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    depends_on:
      - app

  discord-bot:
    init: true
    build:
      context: ./discord-bot
    container_name: archon-discord-bot
    env_file: .env
    environment:
      DISCORD_BOT_TOKEN: "${DISCORD_BOT_TOKEN:-}"
      DISCORD_SERVER_ID: "${DISCORD_SERVER_ID:-1509185927505907715}"
      CLAUDE_CODE_OAUTH_TOKEN: "${CLAUDE_CODE_OAUTH_TOKEN}"
      ARCHON_DOCKER: "true"
    volumes:
      - ./discord-bot:/app:ro
      - ./scripts/discord-bot-entrypoint.sh:/entrypoint.sh:ro
      - ${HOME}/archon-data/commands:/.claude/commands:ro
      - ${HOME}/archon-data/discord-bot:/data
      - ${HOME}/archon-data/claude-home:/home/botuser/.claude
      - ${HOME}/archon-data/workspaces:/data/projects
    working_dir: /app
    entrypoint: ["/bin/bash", "/entrypoint.sh"]
    networks:
      - archon-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "python3 /app/healthcheck.py || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    depends_on:
      - app

  caddy:
    init: true
    image: caddy:2.9-alpine
    container_name: archon-caddy
    environment:
      ARCHON_DOMAIN: "${ARCHON_DOMAIN:-localhost}"
      OAUTH_EMAIL: "${OAUTH_EMAIL:-admin@example.com}"
    ports:
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - archon-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider --no-check-certificate https://localhost/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    depends_on:
      - oauth2-proxy

networks:
  archon-network:
    driver: bridge

volumes:
  caddy_data:
  caddy_config:
